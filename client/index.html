<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Private Site</title>
<style>
/* ─── Key Prompt UI ────────────────────────────────────────────────────────── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #0f0f1a;
  color: #e0e0e0;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}

#key-prompt {
  background: #1a1a2e;
  border: 1px solid #333;
  border-radius: 12px;
  padding: 2.5rem;
  max-width: 420px;
  width: 90%;
  text-align: center;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}

#key-prompt h1 {
  font-size: 1.5rem;
  margin-bottom: 0.5rem;
  color: #fff;
}

#key-prompt p {
  font-size: 0.9rem;
  color: #888;
  margin-bottom: 1.5rem;
}

#key-prompt input[type="password"] {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1px solid #444;
  border-radius: 8px;
  background: #0f0f1a;
  color: #fff;
  font-size: 1rem;
  margin-bottom: 1rem;
  outline: none;
  transition: border-color 0.2s;
}

#key-prompt input[type="password"]:focus {
  border-color: #4a90d9;
}

#key-prompt button {
  width: 100%;
  padding: 0.75rem;
  background: #4a90d9;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

#key-prompt button:hover { background: #357abd; }
#key-prompt button:disabled { background: #555; cursor: not-allowed; }

#error-msg {
  color: #ff6b6b;
  font-size: 0.85rem;
  margin-top: 1rem;
  display: none;
}

/* ─── Loading State ────────────────────────────────────────────────────────── */
#loading {
  display: none;
  text-align: center;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 200px;
}

#loading .spinner {
  width: 40px;
  height: 40px;
  border: 3px solid #333;
  border-top-color: #4a90d9;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}

@keyframes spin { to { transform: rotate(360deg); } }

#loading p {
  color: #888;
  font-size: 0.9rem;
}

#loading .progress-bar {
  width: 200px;
  height: 4px;
  background: #333;
  border-radius: 2px;
  margin-top: 1rem;
  overflow: hidden;
}

#loading .progress-bar .fill {
  height: 100%;
  background: #4a90d9;
  border-radius: 2px;
  transition: width 0.3s ease;
  width: 0%;
}

</style>
</head>
<body>

<!-- Key Prompt -->
<div id="key-prompt">
  <h1>Unlock Private Site</h1>
  <p>This site is encrypted. Enter the key to decrypt and view.</p>
  <input type="password" id="key-input" placeholder="Encryption key" autofocus>
  <button id="unlock-btn" onclick="handleUnlock()">Unlock</button>
  <div id="error-msg"></div>
</div>

<!-- Loading spinner/progress indicator -->
<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Initializing DuckDB-Wasm...</p>
  <div class="progress-bar"><div class="fill" id="progress-fill"></div></div>
</div>

<!-- Site Content Container -->

<script type="module">
/**
 * ─── Globals ──────────────────────────────────────────────────────────────────
 *
 * Uses DuckDB's native block-level AES-GCM-256 encryption. The encrypted file
 * (site.duckdb) is registered via HTTP URL and ATTACHed with the user's key.
 * DuckDB-Wasm fetches blocks on-demand via range requests and decrypts them
 * using MbedTLS (bundled in the WASM build).
 */

let db = null;
let conn = null;
let blobUrls = []; // Track blob URLs for cleanup

// ─── Service Worker Registration ─────────────────────────────────────────────

// Start registration immediately (runs in parallel with user entering key).
const swReadyPromise = (async () => {
  if (!('serviceWorker' in navigator)) return false;
  try {
    const reg = await navigator.serviceWorker.register('./sw.js', { scope: './' });
    const sw = reg.installing || reg.waiting || reg.active;
    if (sw.state !== 'activated') {
      await new Promise(resolve => {
        sw.addEventListener('statechange', () => {
          if (sw.state === 'activated') resolve();
        });
      });
    }
    if (!navigator.serviceWorker.controller) {
      await new Promise(resolve => {
        navigator.serviceWorker.addEventListener('controllerchange', resolve, { once: true });
        setTimeout(resolve, 3000);
      });
    }
    return true;
  } catch (err) {
    console.warn('[SW] Registration failed:', err);
    return false;
  }
})();

// ─── Initialization ───────────────────────────────────────────────────────────

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  const el = document.getElementById('error-msg');
  el.style.display = 'none';
}

function setLoading(visible, text, progress) {
  document.getElementById('loading').style.display = visible ? 'flex' : 'none';
  if (text) document.getElementById('loading-text').textContent = text;
  if (typeof progress === 'number') {
    const fill = document.getElementById('progress-fill');
    if (fill) fill.style.width = Math.min(100, Math.max(0, progress)) + '%';
  }
}

async function handleUnlock() {
  const keyInput = document.getElementById('key-input');
  const password = keyInput.value.trim();
  if (!password) {
    showError('Please enter the encryption key.');
    return;
  }
  hideError();

  const btn = document.getElementById('unlock-btn');
  btn.disabled = true;

  try {
    document.getElementById('key-prompt').style.display = 'none';
    setLoading(true, 'Initializing DuckDB-Wasm...', 10);

    // ── Subresource Integrity (SRI) for CDN scripts ──
    const SRI_HASHES = {
      esm:      'sha384-ZjwRCqWT4ngpJeFGiokg05xzeeuTYXN1LMW7Kpaib/SUoX8swMyzwzv3NRecLGvy',
      mvpWorker:'sha384-ABB4QFgUoQqfiMRv4Eme20RCo+rO//OBEOJfiUbiZFBRH/4T4xy8Vcu4hLXgPxQ0',
      ehWorker: 'sha384-a2Q5wPfMJHriw96D3xhtkym83ST11xUIm6e27q9d3v4ykPqSzeY7WCXK6CTlJFwb',
      mvpWasm:  'sha384-aPxDmtovNQyMTy8S7zolNUiHoQNvtkLGOWJdPtQpW1T52DQuqeGutmEdb0ycBoNs',
      ehWasm:   'sha384-hw3GjeJZY5QapQ8mwqMHXBPVmTLO+jKm5dlDwkGsEfjyu/HcXx1d0Rwlr/ZAShjq',
    };

    async function verifySRI(text, expectedHash) {
      const [algo, expected] = expectedHash.split('-');
      const buf = new TextEncoder().encode(text);
      const hashBuf = await crypto.subtle.digest('SHA-384', buf);
      const actual = btoa(String.fromCharCode(...new Uint8Array(hashBuf)));
      if (actual !== expected) {
        throw new Error(`SRI check failed: CDN script was tampered with. Expected ${expected.slice(0,16)}…, got ${actual.slice(0,16)}…`);
      }
    }

    async function verifySRIBinary(arrayBuffer, expectedHash) {
      const [algo, expected] = expectedHash.split('-');
      const hashBuf = await crypto.subtle.digest('SHA-384', arrayBuffer);
      const actual = btoa(String.fromCharCode(...new Uint8Array(hashBuf)));
      if (actual !== expected) {
        throw new Error(`SRI check failed: WASM binary was tampered with. Expected ${expected.slice(0,16)}…, got ${actual.slice(0,16)}…`);
      }
    }

    // Initialize DuckDB-Wasm from CDN with SRI verification
    const esmUrl = 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.32.0/+esm';
    const esmResp = await fetch(esmUrl);
    const esmText = await esmResp.text();
    await verifySRI(esmText, SRI_HASHES.esm);
    const duckdb = await import(esmUrl);

    const JSDELIVR_BUNDLES = {
      mvp: {
        mainModule: 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.32.0/dist/duckdb-mvp.wasm',
        mainWorker: 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.32.0/dist/duckdb-browser-mvp.worker.js',
      },
      eh: {
        mainModule: 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.32.0/dist/duckdb-eh.wasm',
        mainWorker: 'https://cdn.jsdelivr.net/npm/@duckdb/duckdb-wasm@1.32.0/dist/duckdb-browser-eh.worker.js',
      },
    };

    setLoading(true, 'Loading WASM bundle...', 30);

    // Select the best bundle for this browser
    const bundle = await duckdb.selectBundle(JSDELIVR_BUNDLES);
    // Fetch worker script, verify SRI hash, then create Blob URL
    const workerResp = await fetch(bundle.mainWorker);
    const workerText = await workerResp.text();
    const workerHashKey = bundle.mainWorker === JSDELIVR_BUNDLES.mvp.mainWorker ? 'mvpWorker' : 'ehWorker';
    await verifySRI(workerText, SRI_HASHES[workerHashKey]);
    const workerBlob = new Blob([workerText], { type: 'application/javascript' });
    const workerUrl = URL.createObjectURL(workerBlob);
    blobUrls.push(workerUrl);
    const worker = new Worker(workerUrl);
    const logger = new duckdb.ConsoleLogger();
    db = new duckdb.AsyncDuckDB(logger, worker);

    // Fetch and verify WASM binary SRI hash before passing to DuckDB
    const wasmResp = await fetch(bundle.mainModule);
    const wasmBuf = await wasmResp.arrayBuffer();
    const wasmHashKey = bundle.mainWorker === JSDELIVR_BUNDLES.mvp.mainWorker ? 'mvpWasm' : 'ehWasm';
    await verifySRIBinary(wasmBuf, SRI_HASHES[wasmHashKey]);
    const wasmBlob = new Blob([wasmBuf], { type: 'application/wasm' });
    const wasmUrl = URL.createObjectURL(wasmBlob);
    blobUrls.push(wasmUrl);
    await db.instantiate(wasmUrl, bundle.pthreadWorker);

    setLoading(true, 'Connecting to encrypted database...', 50);

    // Register the encrypted DB file via HTTP URL — DuckDB-Wasm will use
    // range requests to fetch only the blocks it needs
    const dbUrl = new URL('site.duckdb', location.href).href;
    await db.registerFileURL('site.duckdb', dbUrl, duckdb.DuckDBDataProtocol.HTTP, false);
    conn = await db.connect();

    // ATTACH with the user's encryption key — DuckDB handles decryption natively
    try {
      await conn.query(`ATTACH 'site.duckdb' AS site (ENCRYPTION_KEY '${password.replace(/'/g, "''")}', READ_ONLY)`);
    } catch (e) {
      // Wrong key produces a DuckDB error — make it user-friendly
      throw new Error('Wrong encryption key. Please try again.');
    }

    await conn.query("USE site");

    // Verify VFS table exists
    const check = await conn.query("SELECT COUNT(*) as cnt FROM vfs");
    const count = check.toArray()[0].cnt;
    console.log(`[VFS] Database connected. ${count} files in VFS.`);

    // Await SW registration (started on page load, runs in parallel with key entry)
    const swReady = await swReadyPromise;
    if (!swReady) {
      throw new Error('This site requires a browser with Service Worker support (all modern browsers). Please update your browser.');
    }

    // ── Populate Cache API, then reload so SW serves the site ──
    setLoading(true, 'Preparing site files...', 70);

    const allFiles = await conn.query('SELECT path, mime, content FROM vfs');
    const rows = allFiles.toArray();
    const cache = await caches.open('vfs-cache-v1');

    let cached = 0;
    for (const row of rows) {
      let content = row.content;
      if (typeof content === 'string') {
        const hex = content.replace(/^\\x/i, '');
        const bytes = new Uint8Array(hex.length / 2);
        for (let i = 0; i < hex.length; i += 2) {
          bytes[i / 2] = parseInt(hex.substring(i, i + 2), 16);
        }
        content = bytes;
      } else if (content instanceof ArrayBuffer) {
        content = new Uint8Array(content);
      }

      // Strip leading / so the path resolves relative to the current page's directory
      // (handles GitHub Pages subpaths like /duckblind/)
      const relativePath = row.path.startsWith('/') ? row.path.slice(1) : row.path;
      const url = new URL(relativePath, location.href).href;
      await cache.put(
        new Request(url),
        new Response(content, {
          status: 200,
          headers: { 'Content-Type': row.mime }
        })
      );
      cached++;
      const pct = 70 + Math.floor((cached / rows.length) * 25);
      setLoading(true, `Preparing site files... (${cached}/${rows.length})`, pct);
    }

    // Add /__lock synthetic route that clears cache and returns to key prompt
    const lockHTML = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Locking...</title></head><body><script>
(async () => {
  const reg = await navigator.serviceWorker.ready;
  reg.active.postMessage({ type: 'clear-cache' });
  navigator.serviceWorker.addEventListener('message', (e) => {
    if (e.data.type === 'cache-cleared') window.location.href = './';
  });
})();
</` + `script></body></html>`;
    await cache.put(
      new Request(new URL('__lock', location.href).href),
      new Response(lockHTML, { status: 200, headers: { 'Content-Type': 'text/html' } })
    );

    // Close DuckDB — no longer needed after cache is populated
    await conn.close();
    await db.terminate();
    conn = null;
    db = null;
    blobUrls.forEach(u => URL.revokeObjectURL(u));
    blobUrls = [];

    setLoading(true, 'Loading site...', 99);

    // Check if we were redirected from a deep link (404.html adds ?redirect=/full/path?q=x#hash)
    const params = new URLSearchParams(location.search);
    const redirect = params.get('redirect');
    if (redirect) {
      // Validate redirect is same-origin AND within the app's base path scope.
      // On *.github.io, sibling repos share the origin — check pathname prefix too.
      const resolved = new URL(redirect, location.origin);
      const basePath = location.pathname.replace(/[^/]*$/, ''); // e.g. /duckblind/
      if (resolved.origin === location.origin && resolved.pathname.startsWith(basePath)) {
        window.location.replace(resolved.href);
      } else {
        window.location.reload();
      }
    } else {
      window.location.reload();
    }
    return;

  } catch (err) {
    console.error('[VFS] Unlock failed:', err);
    // Clean up DuckDB resources and blob URLs to prevent leaks on repeated unlock attempts
    try { if (conn) { await conn.close(); conn = null; } } catch { /* ignore */ }
    try { if (db) { await db.terminate(); db = null; } } catch { /* ignore */ }
    blobUrls.forEach(u => { try { URL.revokeObjectURL(u); } catch { /* ignore */ } });
    blobUrls = [];
    setLoading(false);
    document.getElementById('key-prompt').style.display = 'block';
    btn.disabled = false;
    if (err.message && err.message.includes('Wrong encryption key')) {
      showError('Wrong encryption key. Please try again.');
    } else if (err.message && err.message.includes('fetch')) {
      showError('Could not load the encrypted database. Is the server running?');
    } else {
      showError(err.message || 'Failed to unlock the database. Please try again.');
    }
  }
}

// Allow Enter key to trigger unlock
document.getElementById('key-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') handleUnlock();
});

// Expose handleUnlock globally for the onclick handler
window.handleUnlock = handleUnlock;
</script>
</body>
</html>
