name: 'Encrypted VFS Deploy'
description: 'Pack a folder into an encrypted DuckDB database and deploy to GitHub Pages'
inputs:
  source-dir:
    description: 'Directory to pack into the encrypted VFS'
    required: true
  encryption-key:
    description: 'Encryption password (use a repository secret)'
    required: true
  base-path:
    description: 'Base URL path for the site (e.g. /repo-name/ for project sites, / for custom domains). Auto-detected for GitHub Pages.'
    required: false
runs:
  using: 'composite'
  steps:
    - name: Install DuckDB CLI (v1.4.4, checksum-verified)
      shell: bash
      run: |
        curl -fsSL "https://github.com/duckdb/duckdb/releases/download/v1.4.4/duckdb_cli-linux-amd64.zip" -o /tmp/duckdb.zip
        echo "ea79eae4233f1aba9a020c8a61877de38a789bc62cdd37485d3589cd77dc0d3e  /tmp/duckdb.zip" | sha256sum -c
        unzip -o /tmp/duckdb.zip -d /usr/local/bin
        chmod +x /usr/local/bin/duckdb

    - name: Build encrypted VFS
      shell: bash
      run: |
        # Auto-detect base path for GitHub Pages:
        # - User/org sites (<owner>.github.io) → /
        # - Project sites → /<repo-name>/
        # - Explicit input always wins
        BASE_PATH="${{ inputs.base-path }}"
        if [ -z "$BASE_PATH" ]; then
          REPO_NAME="${{ github.event.repository.name }}"
          OWNER="${{ github.repository_owner }}"
          if [ "$REPO_NAME" = "${OWNER}.github.io" ]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${REPO_NAME}/"
          fi
        fi
        node "${{ github.action_path }}/build/pack.mjs" \
          --src "${{ github.workspace }}/${{ inputs.source-dir }}" \
          --out "${{ github.workspace }}/_vfs-dist" \
          --key "${{ inputs.encryption-key }}" \
          --base "$BASE_PATH"

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v4
      with:
        path: ${{ github.workspace }}/_vfs-dist
